# configs/default.yaml
# Thay /path/to/your/dataset bằng root thực tế trên máy của bạn

dataset:
  root: "/mmlab_students/storageStudents/nguyenvd/Thanhld/WSI/dataset"
  
  order: "forward"

  brca:
    csv: "${dataset.root}/wsi_dataset_annotation/tcga_brca/tcga_brca_subset.csv"
    features: "${dataset.root}/TCGA-BRCA_processed/features/"
    splits: "${dataset.root}/wsi_dataset_annotation/tcga_brca"

  rcc:
    csv: "${dataset.root}/wsi_dataset_annotation/tcga_rcc/tcga_kidney_subset.csv"
    features: "${dataset.root}/TCGA-RCC_processed/features/"
    splits: "${dataset.root}/wsi_dataset_annotation/tcga_rcc"

  nsclc:
    csv: "${dataset.root}/wsi_dataset_annotation/tcga_nsclc/tcga_lung_subset.csv"
    features: "${dataset.root}/TCGA-NSCLC_processed/features/"
    splits: "${dataset.root}/wsi_dataset_annotation/tcga_nsclc"

  esca:
    features: "${dataset.root}/TCGA-ESCA_processed/features/"
    splits: "${dataset.root}/wsi_dataset_annotation/tcga_esca"

  tgct:
    features: "${dataset.root}/TCGA-TGCT_processed/features/"
    splits: "${dataset.root}/wsi_dataset_annotation/tcga_tgct"

  cesc:
    features: "${dataset.root}/TCGA-CESC_processed/features/"
    splits: "${dataset.root}/wsi_dataset_annotation/tcga_cesc"

training:
  num_epochs: 10
  lr: 1.0e-5
  weight_decay: 1.0e-4
  seed: 0
  num_folds: 10
  num_tasks: 6

dataloader:
  batch_size: 1       # MIL cố định batch=1 (mỗi WSI là 1 bag có kích thước khác nhau)
  num_workers: 40      # tăng nếu CPU nhiều core, giảm nếu debug

paths:
  task_prompts: "./task_prompts.pt"
  finetuned_checkpoints: "./checkpoints/finetuned"
  merged_checkpoints: "./checkpoints/merged"